<!DOCTYPE html>
<html>
<head>
    <title>AI Support Analyzer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #fff; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; background: #2d2d2d; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        select, textarea, button { width: 100%; margin-bottom: 20px; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #3d3d3d; color: white; font-size: 16px; }
        button { background: #0078d4; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        button:hover { background: #005a9e; }
        #result { background: #111; padding: 20px; border-radius: 5px; font-family: monospace; white-space: pre-wrap; display: none; }
        .loading { display: none; color: #0078d4; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛠️ AI Support Routing Engine</h2>
        
        <label>Select AI Model (Powered by Groq):</label>
        <select id="modelSelect">
            <option value="llama">Llama 3.3 70B (Recommended)</option>
            <option value="mistral">Mixtral 8x7B</option>
            <option value="granite">Gemma 2 9B (Fast Fallback)</option>
        </select>

        <label>Customer Ticket:</label>
        <textarea id="messageInput" rows="4" placeholder="Paste a customer complaint or question here..."></textarea>
        
        <button onclick="analyzeTicket()">Analyze Ticket</button>
        <div id="loading" class="loading">Processing through LangChain...</div>
        
        <div id="result"></div>
    </div>

    <script>
        async function analyzeTicket() {
            const message = document.getElementById('messageInput').value;
            const model = document.getElementById('modelSelect').value;
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');

            if (!message) return alert("Please enter a message!");

            resultDiv.style.display = 'none';
            loadingDiv.style.display = 'block';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, model })
                });
                
                const data = await response.json();
                
                // Pretty-print the JSON output
                resultDiv.innerHTML = JSON.stringify(data, null, 4);
                resultDiv.style.display = 'block';
            } catch (error) {
                resultDiv.innerHTML = "Error: " + error;
                resultDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
